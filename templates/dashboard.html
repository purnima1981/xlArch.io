<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XlArch</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0e0e0e;color:#ddd;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.top{height:52px;background:#080808;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0}
.top img{height:24px;opacity:0.5}
.sp{flex:1}
.avatar{width:30px;height:30px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#666;border:1px solid #2a2a2a}
.uname{font-size:12px;color:#444}
.logout{padding:5px 14px;font-size:11px;background:transparent;border:1px solid #2a2a2a;border-radius:6px;color:#555;cursor:pointer;text-decoration:none;font-family:inherit}
.logout:hover{border-color:#444;color:#888}
.main{flex:1;display:flex;align-items:center;justify-content:center}
.inner{text-align:center;max-width:500px;width:100%;padding:20px}
.inner img{height:40px;opacity:0.35;margin-bottom:28px}
.inner h2{font-size:22px;font-weight:700;margin-bottom:10px;letter-spacing:-0.5px}
.inner p{font-size:15px;color:#555;margin-bottom:32px;line-height:1.6}
.prompt{position:relative}
.prompt textarea{width:100%;height:100px;padding:16px 18px;background:#161616;border:1.5px solid #2a2a2a;border-radius:12px;color:#ddd;font-size:14px;font-family:inherit;resize:none;outline:none;line-height:1.6}
.prompt textarea:focus{border-color:#444}
.prompt textarea::placeholder{color:#444}
.prompt button{position:absolute;bottom:12px;right:12px;padding:10px 24px;background:#fff;color:#111;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.prompt button:hover{opacity:0.85}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:18px}
.chip{padding:8px 16px;font-size:12px;background:transparent;border:1px solid #2a2a2a;border-radius:8px;color:#555;cursor:pointer;font-family:inherit}
.chip:hover{border-color:#444;color:#888}
.status{height:28px;background:#080808;border-top:1px solid #1e1e1e;display:flex;align-items:center;padding:0 14px;font-size:10px;color:#333;gap:12px}
.dot{width:5px;height:5px;border-radius:50%;background:#3a3}
</style>
</head>
<body>

<div class="top">
  <img src="/static/logo.svg" alt="XlArch">
  <div class="sp"></div>
  <div class="avatar">{{ user.name[0] | upper }}</div>
  <span class="uname">{{ user.name }}</span>
  <a href="/auth/logout" class="logout">Log out</a>
</div>

<div class="main">
  <div class="inner">
    <img src="/static/logo.svg" alt="">
    <h2>What are you architecting?</h2>
    <p>Describe your system. XlArch generates a validated, production-ready architecture.</p>
    <div class="prompt">
      <textarea id="prompt" placeholder="e.g. Real-time fraud detection system that ingests transactions, runs ML inference, stores results, and alerts on suspicious activity..."></textarea>
      <button onclick="generate()">Generate →</button>
    </div>
    <div class="chips">
      <button class="chip" onclick="fill('Real-time analytics pipeline with streaming and batch processing')">Real-time Analytics</button>
      <button class="chip" onclick="fill('MLOps platform with feature store, model registry, and monitoring')">MLOps Platform</button>
      <button class="chip" onclick="fill('Event-driven microservices with async messaging')">Event-Driven</button>
      <button class="chip" onclick="fill('Data lakehouse with medallion architecture')">Data Lakehouse</button>
      <button class="chip" onclick="fill('Microservices with service mesh and observability')">Microservices</button>
      <button class="chip" onclick="fill('IoT telemetry pipeline with real-time alerting')">IoT Pipeline</button>
    </div>
  </div>
</div>

<div class="status">
  <div class="dot"></div>
  <span>Ready</span>
  <div class="sp"></div>
  <span>v0.1</span>
</div>

<script>
const p = document.getElementById("prompt");
function fill(t) { p.value = t; p.focus(); }
function generate() {
  if (!p.value.trim()) return;
  alert("Canvas coming next! Prompt:\n\n" + p.value);
}
p.addEventListener("keydown", e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) generate(); });
</script>

</body>
</html>
